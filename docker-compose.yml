services:
  merry:
    build: .
    restart: unless-stopped
    environment:
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Ollama (local LLM — for main LLM or Zoro)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Note: if your .env has OLLAMA_BASE_URL=http://localhost:11434, Docker
      # will use that — localhost inside a container is NOT your host machine.
      # Change it to http://host.docker.internal:11434 in your .env.
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      # Zoro-specific LLM override
      - ZORO_LLM_PROVIDER=${ZORO_LLM_PROVIDER}
      - ZORO_OLLAMA_BASE_URL=${ZORO_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - ZORO_OLLAMA_MODEL=${ZORO_OLLAMA_MODEL:-llama3.2}
      # Runtime
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Persistence (task store)
      - PERSISTENCE_TYPE=file
      - DB_PATH=/app/data/store.json
      - AGENT_TIMEOUT_MS=${AGENT_TIMEOUT_MS:-60000}
      # Luffy agent (captain — behavioral monitoring)
      - LUFFY_ENABLED=${LUFFY_ENABLED:-true}
      - LUFFY_CHECK_INTERVAL_MS=${LUFFY_CHECK_INTERVAL_MS:-300000}
      - LUFFY_REPORT_TO_CHAT=${LUFFY_REPORT_TO_CHAT:-true}
      # Franky agent (inter-agent conversation director)
      - FRANKY_CHAT_ENABLED=${FRANKY_CHAT_ENABLED:-true}
      - FRANKY_CHAT_INTERVAL_MS=${FRANKY_CHAT_INTERVAL_MS:-2700000}
      - FRANKY_CHAT_MIN_DELAY_MS=${FRANKY_CHAT_MIN_DELAY_MS:-1800000}
      # Brook agent (news herald + Soul King)
      - BROOK_ENABLED=${BROOK_ENABLED:-true}
      - BROOK_ONEPIECE_INTERVAL_MS=${BROOK_ONEPIECE_INTERVAL_MS:-14400000}
      - BROOK_ANIME_INTERVAL_MS=${BROOK_ANIME_INTERVAL_MS:-14400000}
      - BROOK_MUSIC_INTERVAL_MS=${BROOK_MUSIC_INTERVAL_MS:-21600000}
      - BROOK_NEWS_INTERVAL_MS=${BROOK_NEWS_INTERVAL_MS:-7200000}
      - BROOK_SING_INTERVAL_MS=${BROOK_SING_INTERVAL_MS:-5400000}
      - BROOK_MIN_DELAY_MS=${BROOK_MIN_DELAY_MS:-900000}
      # Proactive crew chat
      - CREW_CHAT_ENABLED=${CREW_CHAT_ENABLED:-true}
      - CREW_CHAT_INTERVAL_MS=${CREW_CHAT_INTERVAL_MS:-1200000}
      - CREW_CHAT_MIN_DELAY_MS=${CREW_CHAT_MIN_DELAY_MS:-600000}
      - CREW_CHAT_INACTIVE_THRESHOLD_MS=${CREW_CHAT_INACTIVE_THRESHOLD_MS:-172800000}
      # Weather context for crew conversations (optional)
      - USER_CITY=${USER_CITY}
      - USER_LATITUDE=${USER_LATITUDE}
      - USER_LONGITUDE=${USER_LONGITUDE}
      # GitHub
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_MAX_RESULTS=${GITHUB_MAX_RESULTS:-5}
      # Zoro knowledge builder
      - ZORO_ENABLED=${ZORO_ENABLED:-true}
      - ZORO_WORKERS=${ZORO_WORKERS:-3}
      - ZORO_WORKER_IDLE_MS=${ZORO_WORKER_IDLE_MS:-5000}
      - ZORO_DISCOVERY_INTERVAL_MS=${ZORO_DISCOVERY_INTERVAL_MS:-300000}
      - ZORO_RATE_LIMIT_SLEEP_MS=${ZORO_RATE_LIMIT_SLEEP_MS:-60000}
      - ZORO_KNOWLEDGE_DIR=/app/knowledge
      # Nami context search (reads from the same knowledge volume)
      - CONTEXT_ROOT_DIR=/app/knowledge
      - CONTEXT_SEARCH_DEPTH=${CONTEXT_SEARCH_DEPTH:-5}
      - CONTEXT_MAX_RESULTS=${CONTEXT_MAX_RESULTS:-10}
      # Tony
      - TONY_CHECK_INTERVAL_MS=${TONY_CHECK_INTERVAL_MS:-10000}
      - TONY_STUCK_THRESHOLD_MS=${TONY_STUCK_THRESHOLD_MS:-120000}
      # Admin
      - ADMIN_USER_IDS=${ADMIN_USER_IDS:-}
      # Chat IDs that receive proactive messages from startup (no first-message required)
      - ADMIN_CHAT_IDS=${ADMIN_CHAT_IDS:-}
      - ENABLE_AUDIT_LOGS=true
      - USE_MOCK_AGENTS=false
      - USE_MOCK_TELEGRAM=false
    volumes:
      # Task + result persistence
      - merry_data:/app/data
      # Knowledge base — persists across restarts, shared between Zoro (write) and Nami (read)
      - merry_knowledge:/app/knowledge

volumes:
  merry_data:
  merry_knowledge:
